<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <div class="title">SignalScope</div>
          <div class="sub">Passive Wi‑Fi + BLE metadata awareness</div>
        </div>
        <div class="pill">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Starting…</span>
        </div>
      </header>

      <main class="hud">
        <section class="card left">
          <div class="rowHead">
            <div class="cardTitle" style="margin:0">Radar</div>
            <div class="legend">
              <span class="lg"><i class="sw g"></i>Normal</span>
              <span class="lg"><i class="sw y"></i>Interesting</span>
              <span class="lg"><i class="sw r"></i>Suspicious</span>
            </div>
          </div>
          <canvas id="radar" width="720" height="720"></canvas>
        </section>

        <section class="card mid">
          <div class="rowHead">
            <div class="cardTitle" style="margin:0">Devices</div>
            <div class="metaRow" style="margin:0">
              <div>Last scan: <span id="lastScan">—</span></div>
              <div>Total: <span id="deviceCount">0</span></div>
            </div>
          </div>
          <div class="filters">
            <input id="q" class="inp" placeholder="Search SSID/name/vendor/BSSID…" />
            <label class="chk"><input id="onlySusp" type="checkbox" /> Suspicious</label>
            <label class="chk"><input id="onlyCam" type="checkbox" /> Cameras</label>
            <label class="chk"><input id="onlyWifi" type="checkbox" /> Wi‑Fi</label>
            <label class="chk"><input id="onlyBle" type="checkbox" /> BLE</label>
          </div>
          <div id="deviceList" class="list"></div>
        </section>

        <section class="card right">
          <div class="rowHead">
            <div class="cardTitle" style="margin:0">Intel</div>
            <div class="btnRow">
              <button id="btnDebrief" class="btn smallBtn">Debrief</button>
              <button id="btnEvents" class="btn smallBtn">Events</button>
              <label class="chk"><input id="showLan" type="checkbox" checked /> LAN overlay</label>
              <a class="btn smallBtn" href="/export/devices.csv" target="_blank" rel="noreferrer">Devices CSV</a>
              <a class="btn smallBtn" href="/export/events.csv" target="_blank" rel="noreferrer">Events CSV</a>
            </div>
          </div>

          <div class="drawerHead">
            <div>Selected: <span id="selectedLabel" class="mono">—</span></div>
            <div class="muted">Details + explain</div>
          </div>

          <div id="detail" class="detail"></div>

          <div class="chartWrap">
            <div class="chartHead">
              <div class="muted">RSSI timeline + trail</div>
              <div>Motion: <span id="selMotion">—</span></div>
            </div>
            <canvas id="rssiChart" width="720" height="180"></canvas>
            <canvas id="trail" width="720" height="220"></canvas>
          </div>

          <div class="eventsBox" style="width:auto">
            <div class="eventsHead">
              <div class="cardTitle" style="margin:0">Events</div>
            </div>
            <div id="events" class="events"></div>
          </div>

          <div class="eventsBox" style="width:auto">
            <div class="eventsHead">
              <div class="cardTitle" style="margin:0">LAN neighbors (ARP cache)</div>
              <button id="btnNeighbors" class="btn smallBtn">Refresh</button>
            </div>
            <div id="neighbors" class="neighbors"></div>
          </div>

          <pre id="debrief" class="debrief"></pre>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
